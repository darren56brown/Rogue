<head>
    <link rel="stylesheet" href="css/inventory.css">
</head>
<body>
    <div id="inventoryPanel" class="ui-panel">
        <div class="viewer-header">
            <h2>&lt;None&gt;</h2>
            <button id="closeInventory" class="close-x">×</button>
        </div>
        
        <div class="inventory-panel-rows">
            <div class="inventory-top-half">
                <h3>Inventory</h3>
                <!--<div class="inventory-group"></div>-->
                    <div id="inventoryGrid" class="inventory-grid"></div>
                    <div id="goldDisplay" class="gold-display">
                            Gold: <span id="goldAmount">0</span>
                    </div>
                <!--</div>-->
            </div>

            <div class="inventory-bottom-half">
                <div class="equipment-panel">
                    <h3>Equipment</h3>
                    <div id="equipmentGrid" class="equipment-grid"></div>
                </div>
                <div class="item-info-panel">
                    <h3>Item Info</h3>
                    <div id="itemDescription" class="item-desc">Hover or select an item...</div>
                </div>
            </div>
        </div>
    </div>
</body>


<head>
    <link rel="stylesheet" href="css/sprite_viewer.css">
</head>
<body>
    <div id="spriteViewer" class="ui-panel">
        <div class="viewer-header">
            <h2>Player</h2>
            <button id="closeViewer" class="close-x">×</button>
        </div>
        
        <div class="viewer-main">
            <div class="viewer-body">
                <canvas id="viewerCanvas" width="128" height="128"></canvas>
            </div>
            
            <div class="direction-pad">
                <button id="dirUp" class="dir-btn">↑</button>
                <div class="dir-middle">
                    <button id="dirLeft" class="dir-btn">←</button>
                    <button id="idleBtn" class="idle-btn">IDLE</button>
                    <button id="dirRight" class="dir-btn">→</button>
                </div>
                <button id="dirDown" class="dir-btn">↓</button>
            </div>
        </div>

        <div class="viewer-controls">
            <div class="action-row">
                <button id="prevAnim" class="small-btn">PREV</button>
                <div id="animLabel">
                    <span id="animNameText">Walk Right</span>
                    <small id="animDetailsText">Row 11 | 9 columns</small>
                </div>
                <button id="nextAnim" class="small-btn">NEXT</button>
            </div>
        </div>
    </div>
</body>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Some Game!</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="mainContainer">
        <canvas id="mainCanvas"></canvas>

        <div id="hud" class="hud">
            <div class="status-panel">
                <div id="hearts-container" class="hearts-container"></div>
            </div>

            <div class="hotbar-container">
                <div id="hotbar" class="hotbar">
                    <div id="hotbar-slots" class="slots"></div>
                </div>
            </div>
        </div>

        <div id="mainMenu" class="ui-panel is-active">
            <h1>Some Game!</h1>
            <button id="playButton">Play</button>
            <div style="margin-top: 20px; font-size: 12px;"></div>
            <div>
                <div>Mouse - Move</div>
                <div>ESC - Pause</div>
            </div>
        </div>

        <div id="pauseMenu" class="ui-panel">
            <h2>PAUSED</h2>
            <button id="resumeButton">Resume</button>
            <button id="quitButton">Quit</button>
        </div>

        <div id="spriteViewer" class="ui-panel">
            <div class="viewer-header">
                <h2>Player</h2>
                <button id="closeViewer" class="close-x">×</button>
            </div>
            
            <div class="viewer-main">
                <!-- Canvas on the left -->
                <div class="viewer-body">
                    <canvas id="viewerCanvas" width="128" height="128"></canvas>
                </div>
                
                <!-- Direction pad up and to the right of the canvas -->
                <div class="direction-pad">
                    <button id="dirUp" class="dir-btn">↑</button>
                    <div class="dir-middle">
                        <button id="dirLeft" class="dir-btn">←</button>
                        <button id="idleBtn" class="idle-btn">IDLE</button>
                        <button id="dirRight" class="dir-btn">→</button>
                    </div>
                    <button id="dirDown" class="dir-btn">↓</button>
                </div>
            </div>

            <!-- PREV + Label + NEXT below everything -->
            <div class="viewer-controls">
                <div class="action-row">
                    <button id="prevAnim" class="small-btn">PREV</button>
                    <div id="animLabel">
                        <span id="animNameText">Walk Right</span>
                        <small id="animDetailsText">Row 11 | 9 columns</small>
                    </div>
                    <button id="nextAnim" class="small-btn">NEXT</button>
                </div>
            </div>
        </div>

    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
